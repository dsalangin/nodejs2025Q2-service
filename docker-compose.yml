version: '3.0'

services:
  postgres:
    image: postgres
    build: ./src/db
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
      - db-logs:/var/log/postgresql
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_PORT}'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  app: 
    build: .
    container_name: app
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./src:/usr/app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "while ! nc -z postgres 5432; do sleep 1; done && npx prisma migrate deploy && npm run start:dev"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  db-data:
  db-logs: